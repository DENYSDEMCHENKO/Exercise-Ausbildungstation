version: '3.8'

services:
  nasa-exporter:
    build: .
    container_name: nasa-exporter
    ports:
      - "8000:8000"
    networks:
      - monitoring-net

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - monitoring-net

networks:
  monitoring-net: